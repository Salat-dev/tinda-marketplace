    <style>
        /* ══════════════════════════════════════════════════════════
           DESIGN SYSTEM Mayi
        ══════════════════════════════════════════════════════════ */
        :root {
       --color-bg: #FFFFFF;
    --color-bg-secondary: #FAFAFA;
    --color-bg-tertiary: #F5F5F5;

    --color-text: #000000;
    --color-text-secondary: #4B5563;
    --color-text-tertiary: #6B7280;

    /* ===== BRAND ===== */
    --color-accent: #076128;
    --color-accent-hover: #15803D;

    /* ===== CTA / PROMO ===== */
    --color-orange: #F97316;
    --color-orange-hover: #EA580C;
            --font-display: 'inter', system-ui;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-display);
            background: #FAFAFA;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══ CONTENEUR PRINCIPAL ═══ */
        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* ═══ LOGO ═══ */
        .splash__logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .splash__logo-mark {
            width: 48px;
            height: 48px;
            background: #1D1D1F;
            color: white;
            font-family: var(--font-serif);
            font-size: 24px;
            font-weight: 600;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .splash__logo-text {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #1D1D1F;
        }

        /* ═══ SPINNER ═══ */
        .splash__spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #E8E8ED;
            border-top-color: #076128;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ═══ TEXTE ═══ */
        .splash__text {
            font-size: 15px;
            color: #86868B;
        }

        /* ═══ BOUTON ═══ */
        .splash__btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            background: #076128;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 4px 16px rgba(0, 113, 227, 0.3);
        }

        .splash__btn:hover {
            background: #15803D;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 113, 227, 0.4);
        }

        .splash__btn svg {
            width: 14px;
            height: 14px;
        }

        /* ═══ ANIMATION D'ENTRÉE ═══ */
        .splash__logo,
        .splash__spinner,
        .splash__text,
        .splash__btn {
            animation: fadeUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        .splash__logo    { animation-delay: 0.05s; }
        .splash__spinner { animation-delay: 0.15s; }
        .splash__text    { animation-delay: 0.25s; }
        .splash__btn     { animation-delay: 0.35s; }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="splash">
        <!-- Logo Mayi -->
        <a href="/" class="navbar__logo" aria-label="Mayi — Accueil">
                                <img src="./assets/icons/logo.svg" alt="Mayi" class="navbar__logo-svg" />

            </a>

        <!-- Spinner de chargement -->
        <div class="splash__spinner"></div>

        <!-- Message -->
        <p class="splash__text">Redirection vers la boutique…</p>

        <!-- Bouton manuel (au cas où la redirection ne fonctionne pas) -->
        <a href="index.html" class="splash__btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            Accéder à la boutique
        </a>
    </div>
